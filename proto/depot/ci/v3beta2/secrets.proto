syntax = "proto3";

package depot.ci.v3beta2;

import "depot/ci/v3beta2/types.proto";
import "google/protobuf/timestamp.proto";

service SecretService {
  rpc ListSecrets(ListSecretsRequest) returns (ListSecretsResponse);
  rpc GetSecret(GetSecretRequest) returns (GetSecretResponse);
  rpc GetSecretVariant(GetSecretVariantRequest) returns (GetSecretVariantResponse);

  rpc CreateSecretVariant(CreateSecretVariantRequest) returns (CreateSecretVariantResponse);
  rpc SetSecretVariant(SetSecretVariantRequest) returns (SetSecretVariantResponse);
  rpc UpdateSecretVariantMetadata(UpdateSecretVariantMetadataRequest) returns (UpdateSecretVariantMetadataResponse);
  rpc UpdateSecretVariantValue(UpdateSecretVariantValueRequest) returns (UpdateSecretVariantValueResponse);
  rpc DeleteSecretVariant(DeleteSecretVariantRequest) returns (DeleteSecretVariantResponse);
  rpc DeleteSecret(DeleteSecretRequest) returns (DeleteSecretResponse);
}

message Secret {
  string id = 1;
  string name = 2;
  repeated SecretVariant variants = 3;
  uint32 variant_count = 4;
  optional google.protobuf.Timestamp last_modified = 5;
}

message SecretVariant {
  string id = 1;
  string secret_id = 2;
  string name = 3;
  optional string description = 4;

  // Attributes describe the job context this variant matches against.
  // A variant with no attributes matches all jobs.
  repeated Attribute attributes = 5;

  optional google.protobuf.Timestamp last_modified = 6;

  // Server-computed: variants under the same secret sharing the same value get the same index.
  optional uint32 value_group_index = 7;
}

message ListSecretsRequest {
  PageRequest page = 1;

  // Optional name search/prefix/filter depending on product behavior.
  string query = 2;

  // Optional filter for variants matching these attributes.
  repeated Attribute attributes = 3;
}

message ListSecretsResponse {
  repeated Secret secrets = 1;
  PageResponse page = 2;
}

message GetSecretRequest {
  oneof lookup {
    string id = 1;
    string name = 2;
  }
}

message GetSecretResponse {
  Secret secret = 1;
}

message GetSecretVariantRequest {
  string id = 1;
}

message GetSecretVariantResponse {
  SecretVariant variant = 1;
}

message SetSecretVariantRequest {
  string secret_name = 1;

  // Defaults to "default" when empty.
  string variant_name = 2;

  string value = 3;
  optional string description = 4;

  // Attributes describe the job context this variant matches against.
  // Empty attributes means the variant is available everywhere.
  repeated Attribute attributes = 5;
}

message SetSecretVariantResponse {
  Secret secret = 1;
  SecretVariant variant = 2;
  bool created_secret = 3;
  bool created_variant = 4;
}

message CreateSecretVariantRequest {
  string secret_name = 1;

  // Defaults to "default" when empty.
  string variant_name = 2;

  string value = 3;
  optional string description = 4;

  // Attributes describe the job context this variant matches against.
  // Empty attributes means the variant is available everywhere.
  repeated Attribute attributes = 5;
}

message CreateSecretVariantResponse {
  Secret secret = 1;
  SecretVariant variant = 2;
  bool created_secret = 3;
  bool created_variant = 4;
}

message UpdateSecretVariantMetadataRequest {
  string variant_id = 1;

  // Allows renaming a variant, e.g. default -> production.
  string name = 2;

  string description = 3;
  repeated Attribute attributes = 4;
}

message UpdateSecretVariantMetadataResponse {
  SecretVariant variant = 1;
}

message UpdateSecretVariantValueRequest {
  string variant_id = 1;
  string value = 2;
}

message UpdateSecretVariantValueResponse {
  SecretVariant variant = 1;
}

message DeleteSecretVariantRequest {
  string variant_id = 1;
}

message DeleteSecretVariantResponse {
  bool deleted_secret = 1;
}

message DeleteSecretRequest {
  oneof lookup {
    string id = 1;
    string name = 2;
  }
}

message DeleteSecretResponse {}
