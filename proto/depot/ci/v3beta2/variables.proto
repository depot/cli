syntax = "proto3";

package depot.ci.v3beta2;

import "google/protobuf/timestamp.proto";
import "depot/ci/v3beta2/types.proto";

service VariableService {
  rpc ListVariables(ListVariablesRequest) returns (ListVariablesResponse);
  rpc GetVariable(GetVariableRequest) returns (GetVariableResponse);
  rpc GetVariableVariant(GetVariableVariantRequest) returns (GetVariableVariantResponse);

  rpc CreateVariableVariant(CreateVariableVariantRequest) returns (CreateVariableVariantResponse);
  rpc SetVariableVariant(SetVariableVariantRequest) returns (SetVariableVariantResponse);
  rpc UpdateVariableVariantValue(UpdateVariableVariantValueRequest) returns (UpdateVariableVariantValueResponse);
  rpc UpdateVariableVariantMetadata(UpdateVariableVariantMetadataRequest) returns (UpdateVariableVariantMetadataResponse);
  rpc DeleteVariableVariant(DeleteVariableVariantRequest) returns (DeleteVariableVariantResponse);
  rpc DeleteVariable(DeleteVariableRequest) returns (DeleteVariableResponse);
}

message Variable {
  string id = 1;
  string name = 2;
  repeated VariableVariant variants = 3;
  uint32 variant_count = 4;
  optional google.protobuf.Timestamp last_modified = 5;
}

message VariableVariant {
  string id = 1;
  string variable_id = 2;
  string name = 3;
  string value = 4;
  optional string description = 5;
  repeated Attribute attributes = 6;
  optional google.protobuf.Timestamp last_modified = 7;
}

message ListVariablesRequest {
  PageRequest page = 1;
  string query = 2;
  repeated Attribute attributes = 3;
}

message ListVariablesResponse {
  repeated Variable variables = 1;
  PageResponse page = 2;
}

message GetVariableRequest {
  oneof lookup {
    string id = 1;
    string name = 2;
  }
}

message GetVariableResponse {
  Variable variable = 1;
}

message GetVariableVariantRequest {
  string id = 1;
}

message GetVariableVariantResponse {
  VariableVariant variant = 1;
}

message SetVariableVariantRequest {
  string variable_name = 1;

  // Defaults to "default" when empty.
  string variant_name = 2;

  string value = 3;
  optional string description = 4;
  repeated Attribute attributes = 5;
}

message SetVariableVariantResponse {
  Variable variable = 1;
  VariableVariant variant = 2;
  bool created_variable = 3;
  bool created_variant = 4;
}

message CreateVariableVariantRequest {
  string variable_name = 1;

  // Defaults to "default" when empty.
  string variant_name = 2;

  string value = 3;
  optional string description = 4;
  repeated Attribute attributes = 5;
}

message CreateVariableVariantResponse {
  Variable variable = 1;
  VariableVariant variant = 2;
  bool created_variable = 3;
  bool created_variant = 4;
}

message UpdateVariableVariantValueRequest {
  string variant_id = 1;
  string value = 2;
}

message UpdateVariableVariantValueResponse {
  VariableVariant variant = 1;
}

message UpdateVariableVariantMetadataRequest {
  string variant_id = 1;
  string name = 2;
  string description = 3;
  repeated Attribute attributes = 4;
}

message UpdateVariableVariantMetadataResponse {
  VariableVariant variant = 1;
}

message DeleteVariableVariantRequest {
  string variant_id = 1;
}

message DeleteVariableVariantResponse {
  bool deleted_variable = 1;
}

message DeleteVariableRequest {
  oneof lookup {
    string id = 1;
    string name = 2;
  }
}

message DeleteVariableResponse {}
