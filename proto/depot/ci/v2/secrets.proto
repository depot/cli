syntax = "proto3";

package depot.ci.v2;

import "google/protobuf/timestamp.proto";

// SecretService provides separate org-scoped and repo-scoped secret management.
// Repo-scoped secrets override org-scoped secrets at runtime for CI jobs.
service SecretService {
  // Org-scoped secrets (no repo in path)
  rpc AddOrgSecret(AddOrgSecretRequest) returns (AddOrgSecretResponse);
  rpc RemoveOrgSecret(RemoveOrgSecretRequest) returns (RemoveOrgSecretResponse);
  rpc ListOrgSecrets(ListOrgSecretsRequest) returns (ListOrgSecretsResponse);
  rpc UpdateOrgSecretDescription(UpdateOrgSecretDescriptionRequest) returns (UpdateOrgSecretDescriptionResponse);
  rpc BatchAddOrgSecrets(BatchAddOrgSecretsRequest) returns (BatchAddOrgSecretsResponse);

  // Repo-scoped secrets (path includes hashed repo segment)
  rpc AddRepoSecret(AddRepoSecretRequest) returns (AddRepoSecretResponse);
  rpc RemoveRepoSecret(RemoveRepoSecretRequest) returns (RemoveRepoSecretResponse);
  rpc ListRepoSecrets(ListRepoSecretsRequest) returns (ListRepoSecretsResponse);
  rpc UpdateRepoSecretDescription(UpdateRepoSecretDescriptionRequest) returns (UpdateRepoSecretDescriptionResponse);
  rpc BatchAddRepoSecrets(BatchAddRepoSecretsRequest) returns (BatchAddRepoSecretsResponse);
}

// Shared batch input for secret creation.
message SecretInput {
  string name = 1;
  string value = 2;
  optional string description = 3;
}

// Org-scoped messages
message AddOrgSecretRequest {
  string name = 1;
  string value = 2;
  optional string description = 3;
}

message AddOrgSecretResponse {}

message RemoveOrgSecretRequest {
  string name = 1;
}

message RemoveOrgSecretResponse {}

message ListOrgSecretsRequest {}

message ListOrgSecretsResponse {
  repeated Secret secrets = 1;
}

message Secret {
  string name = 1;
  optional string description = 2;
  optional google.protobuf.Timestamp last_modified = 3;
}

message UpdateOrgSecretDescriptionRequest {
  string name = 1;
  string description = 2;
}

message UpdateOrgSecretDescriptionResponse {}

message BatchAddOrgSecretsRequest {
  repeated SecretInput secrets = 1;
}

message BatchAddOrgSecretsResponse {}

// Repo-scoped messages (include repo for path resolution)
message AddRepoSecretRequest {
  string repo = 1;  // e.g. "owner/name"
  string name = 2;
  string value = 3;
  optional string description = 4;
}

message AddRepoSecretResponse {}

message RemoveRepoSecretRequest {
  string repo = 1;
  string name = 2;
}

message RemoveRepoSecretResponse {}

message ListRepoSecretsRequest {
  string repo = 1;
}

message ListRepoSecretsResponse {
  repeated Secret secrets = 1;
}

message UpdateRepoSecretDescriptionRequest {
  string repo = 1;
  string name = 2;
  string description = 3;
}

message UpdateRepoSecretDescriptionResponse {}

message BatchAddRepoSecretsRequest {
  string repo = 1;
  repeated SecretInput secrets = 2;
}

message BatchAddRepoSecretsResponse {}
