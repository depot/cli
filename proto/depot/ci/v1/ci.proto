syntax = "proto3";

package depot.ci.v1;

// CIService is the customer-facing API for managing CI runs, workflows, and jobs.
// Authenticated with organization or app tokens.
service CIService {
  // Run triggers a CI run that can contain one or more workflows
  rpc Run(RunRequest) returns (RunResponse) {}

  // DispatchWorkflow triggers a single workflow via workflow_dispatch, validating inputs against the workflow's schema
  rpc DispatchWorkflow(DispatchWorkflowRequest) returns (DispatchWorkflowResponse) {}

  // RetryJob retries a failed job within a running workflow
  rpc RetryJob(RetryJobRequest) returns (RetryJobResponse) {}

  // RerunWorkflow resets all jobs in a finished workflow and re-runs them
  rpc RerunWorkflow(RerunWorkflowRequest) returns (RerunWorkflowResponse) {}

  // RetryFailedJobs retries only failed/cancelled jobs (and their skipped dependents) in a finished workflow
  rpc RetryFailedJobs(RetryFailedJobsRequest) returns (RetryFailedJobsResponse) {}

  // CancelJob cancels a queued or running job
  rpc CancelJob(CancelJobRequest) returns (CancelJobResponse) {}

  // CancelWorkflow cancels a queued or running workflow and all its child jobs
  rpc CancelWorkflow(CancelWorkflowRequest) returns (CancelWorkflowResponse) {}

  // GetRun returns a flat CI run record
  rpc GetRun(GetRunRequest) returns (GetRunResponse) {}

  // CancelRun cancels a queued or running CI run and all active child work
  rpc CancelRun(CancelRunRequest) returns (CancelRunResponse) {}

  // GetRunStatus returns the current status of a run including its workflows, jobs, and attempts
  rpc GetRunStatus(GetRunStatusRequest) returns (GetRunStatusResponse) {}

  // GetWorkflow returns curated workflow, run, execution, job, and attempt metadata for single-workflow inspection
  rpc GetWorkflow(GetWorkflowRequest) returns (GetWorkflowResponse) {}

  // GetJobAttemptMetrics returns CPU and memory metrics for one concrete job attempt
  rpc GetJobAttemptMetrics(GetJobAttemptMetricsRequest) returns (GetJobAttemptMetricsResponse) {}

  // GetJobMetrics returns per-attempt CPU and memory metric summaries for one job
  rpc GetJobMetrics(GetJobMetricsRequest) returns (GetJobMetricsResponse) {}

  // GetRunMetrics returns workflow/job/attempt CPU and memory metric summaries for one run
  rpc GetRunMetrics(GetRunMetricsRequest) returns (GetRunMetricsResponse) {}

  // GetJobAttemptSummary returns authored step summary markdown for one concrete job attempt
  rpc GetJobAttemptSummary(GetJobAttemptSummaryRequest) returns (GetJobSummaryResponse) {}

  // GetJobSummary resolves one job to its current/latest attempt and returns authored step summary markdown
  rpc GetJobSummary(GetJobSummaryRequest) returns (GetJobSummaryResponse) {}

  // GetJobAttemptLogs returns log lines for a job attempt
  rpc GetJobAttemptLogs(GetJobAttemptLogsRequest) returns (GetJobAttemptLogsResponse) {}

  // StreamJobAttemptLogs follows persisted log lines for a job attempt.
  //
  // This is a framed Connect/gRPC server stream, not a raw text response. Clients
  // should consume response messages with a generated client or protocol-aware
  // decoder. Each response includes the current attempt_status. Responses that
  // carry a line also include next_cursor; persist that cursor and send it on a
  // later request to resume after the emitted line.
  rpc StreamJobAttemptLogs(StreamJobAttemptLogsRequest) returns (stream StreamJobAttemptLogsResponse) {}

  // ExportJobAttemptLogs exports a finite snapshot of persisted log lines.
  //
  // This is a framed Connect/gRPC server stream, not a raw HTTP file download.
  // Agents and API clients should call it with a generated client or
  // protocol-aware decoder, read the first metadata response, then append each
  // following chunk response to a file or writer in order. Use the Depot CLI
  // `depot ci logs --output-file` when a shell-native file download is needed.
  rpc ExportJobAttemptLogs(ExportJobAttemptLogsRequest) returns (stream ExportJobAttemptLogsResponse) {}

  // ListRuns returns recent CI runs for the authenticated organization.
  //
  // This is a recent run discovery API, not a historical search API. Results are always
  // newest-first, filters are applied before the limit, and cursor pagination is preserved.
  rpc ListRuns(ListRunsRequest) returns (ListRunsResponse) {}

  // ListWorkflows returns a paginated list of recent CI workflows for the authenticated organization
  rpc ListWorkflows(ListWorkflowsRequest) returns (ListWorkflowsResponse) {}
}

// MigrationService is the API used by `depot ci migrate` to handhold customers during the
// process of migrating GitHub workflow files to Depot CI
service MigrationService {
  rpc GetInstallation(GetInstallationRequest) returns (GetInstallationResponse) {}
  rpc ImportSecretsAndVars(ImportSecretsAndVarsRequest) returns (ImportSecretsAndVarsResponse) {}
}

message GetInstallationRequest {
  // repo is the name of the target GitHub repo in {org}/{repo} format
  string repo = 1;
}

message GetInstallationResponse {
  repeated Installation installations = 1;
}

message ImportSecretsAndVarsRequest {
  // repo is the name of the target GitHub repo in {org}/{repo} format
  string repo = 1;
  // dry_run returns the planned branch, workflow name, and content without committing
  bool dry_run = 2;
  // branch_name overrides the default branch name used to create the migration workflow
  string branch_name = 3;

  // include_secrets is a list of secret names to include in the workflow
  repeated string include_secrets = 4;
  // include_vars is a list of variable names to include in the workflow
  repeated string include_vars = 5;
}
message ImportSecretsAndVarsResponse {
  oneof result {
    DryRunResult dry_run_result = 1;
    RunResult run_result = 2;
  }
}

message DryRunResult {
  string branch_name = 1;
  string workflow_name = 2;
  string workflow_content = 3;
}

message RunResult {
  string workflow_url = 1;
}

message Installation {
  string installation_id = 1;
  string settings_url = 2;
  string owner = 3;
  bool requires_new_perms = 4;
  bool repo_accessible = 5;
}

message RunRequest {
  // repo is the name of the target GitHub repo in {org}/{repo} format
  string repo = 1;
  // sha points to a snapshot of code, used as context for the run
  // defaults to HEAD of default branch
  optional string sha = 2;
  // workflow specifies which workflow file to run (e.g., ".depot/workflows/ci.yml")
  // mutually exclusive with workflow_content; if neither provided, runs all workflows in repo
  optional string workflow = 3;
  // workflow_content is a list of inline workflow YAML strings
  // mutually exclusive with workflow; if neither provided, runs all workflows in repo
  repeated string workflow_content = 4;
  // job filters to a specific job within the workflow
  // only valid when a single workflow is specified (workflow or single workflow_content)
  optional string job = 5;
  // When set, orchestrator compile fetches this generic cache key (same bytes the worker applies)
  // and runs git apply in the compile temp repo before resolving .depot/actions and .depot/workflows.
  optional string workspace_patch_cache_key = 6;
}

message RunResponse {
  // org_id is the organization that owns this run
  string org_id = 2;
  // run_id is the unique identifier for the created CI run
  string run_id = 1;
}

// DispatchWorkflow messages

message DispatchWorkflowRequest {
  // org_id is the organization that owns the workflow
  string org_id = 1;
  // repo is the name of the target GitHub repo in {org}/{repo} format
  string repo = 2;
  // workflow is the workflow file basename (e.g., "deploy.yml"), not the
  // full repo path. Matches GitHub's workflow_dispatch convention.
  string workflow = 3;
  // ref is the branch or tag name to run the workflow on (e.g., "main")
  string ref = 4;
  // inputs are key-value pairs matching the workflow's input definitions
  // all values are strings; the server coerces to the correct type
  map<string, string> inputs = 5;
}

message DispatchWorkflowResponse {
  // org_id is the organization that owns this run
  string org_id = 1;
  // run_id is the unique identifier for the created CI run
  string run_id = 2;
}

// RetryJob messages

message RetryJobRequest {
  // workflow_id identifies the workflow containing the job
  string workflow_id = 1;
  // job_id identifies the job to retry
  string job_id = 2;
}

message RetryJobResponse {
  // job_id is the ID of the retried job
  string job_id = 1;
  // attempt_id is the new attempt's unique identifier
  string attempt_id = 2;
  // attempt is the new attempt number
  int32 attempt = 3;
  // status is the new job status (should be "queued")
  string status = 4;
}

// RerunWorkflow messages

message RerunWorkflowRequest {
  // workflow_id identifies the workflow to re-run
  string workflow_id = 1;
}

message RerunWorkflowResponse {
  // workflow_id is the ID of the re-run workflow
  string workflow_id = 1;
  // job_count is the number of jobs reset to queued
  int32 job_count = 2;
}

// RetryFailedJobs messages

message RetryFailedJobsRequest {
  // workflow_id identifies the workflow containing failed jobs
  string workflow_id = 1;
}

message RetryFailedJobsResponse {
  // workflow_id is the ID of the workflow
  string workflow_id = 1;
  // job_ids are the IDs of jobs that were reset to queued
  repeated string job_ids = 2;
  // job_count is the number of jobs reset to queued
  int32 job_count = 3;
}

// CancelJob messages

message CancelJobRequest {
  // workflow_id identifies the workflow containing the job
  string workflow_id = 1;
  // job_id identifies the job to cancel
  string job_id = 2;
}

message CancelJobResponse {
  // job_id is the ID of the cancelled job
  string job_id = 1;
  // status is the new job status (should be "cancelled")
  string status = 2;
}

// CancelWorkflow messages

message CancelWorkflowRequest {
  // workflow_id identifies the workflow to cancel
  string workflow_id = 1;
}

message CancelWorkflowResponse {
  // workflow_id is the ID of the cancelled workflow
  string workflow_id = 1;
  // status is the new workflow status (should be "cancelled")
  string status = 2;
}

// GetRun messages

message GetRunRequest {
  string run_id = 1;
}

message GetRunResponse {
  string org_id = 1;
  string run_id = 2;
  string repo = 3;
  string ref = 4;
  string sha = 5;
  string head_sha = 6;
  string trigger = 7;
  // status is the lowercase run state, e.g. "queued", "running", or "finished".
  string status = 8;
  string created_at = 9;
  string started_at = 10;
  string finished_at = 11;
}

// CancelRun messages

message CancelRunRequest {
  string run_id = 1;
}

message CancelRunResponse {
  string run_id = 1;
  string status = 2;
}

// GetRunStatus messages

message GetRunStatusRequest {
  string run_id = 1;
}

message GetRunStatusResponse {
  string org_id = 1;
  string run_id = 2;
  string status = 3;
  repeated WorkflowStatus workflows = 4;
}

message WorkflowStatus {
  string workflow_id = 1;
  string status = 2;
  // workflow_path is the workflow file path (e.g. ".depot/workflows/ci.yml")
  // empty for inline workflows
  string workflow_path = 3;
  repeated JobStatus jobs = 4;
  // workflow name from YAML `name:` key, empty if not set
  string name = 5;
  // error_message is populated when the workflow has failed (e.g. compilation or validation errors)
  string error_message = 6;
}

message JobStatus {
  string job_id = 1;
  // job_key is the job identifier from the workflow (e.g. "build", "test")
  string job_key = 2;
  string status = 3;
  repeated AttemptStatus attempts = 4;
}

message AttemptStatus {
  string attempt_id = 1;
  int32 attempt = 2;
  string status = 3;
  // sandbox_id is populated when the attempt is running on a sandbox.
  string sandbox_id = 4;
  // session_id is populated alongside sandbox_id.
  string session_id = 5;
}

// GetWorkflow messages

message GetWorkflowRequest {
  // workflow_id identifies the workflow to fetch
  string workflow_id = 1;
}

message GetWorkflowResponse {
  string org_id = 1;

  // Parent run context
  string run_id = 2;
  string repo = 3;
  string ref = 4;
  string sha = 5;
  string head_sha = 6;
  string trigger = 7;
  string run_status = 8;
  string run_created_at = 9;
  string run_started_at = 10;
  string run_finished_at = 11;

  // Workflow metadata
  string workflow_id = 12;
  string workflow_name = 13;
  string workflow_path = 14;
  string workflow_status = 15;
  string workflow_error_message = 16;
  string workflow_created_at = 17;
  string workflow_started_at = 18;
  string workflow_finished_at = 19;

  // executions are workflow-level records; each re-run creates another execution.
  repeated GetWorkflowExecution executions = 20;
  // jobs are the workflow jobs and their per-job attempts.
  repeated GetWorkflowJob jobs = 21;
}

// GetWorkflowExecution describes one workflow execution/re-run.
message GetWorkflowExecution {
  string execution_id = 1;
  int32 execution = 2;
  string status = 3;
  string created_at = 4;
  string started_at = 5;
  string finished_at = 6;
}

message GetWorkflowJob {
  string job_id = 1;
  string job_key = 2;
  string status = 3;
  string started_at = 4;
  string finished_at = 5;
  // attempts are per-job attempts, not workflow execution records.
  repeated GetWorkflowJobAttempt attempts = 6;
}

// GetWorkflowJobAttempt describes one attempt of a job returned by GetWorkflow.
message GetWorkflowJobAttempt {
  string attempt_id = 1;
  int32 attempt = 2;
  string status = 3;
  string sandbox_id = 4;
  string session_id = 5;
  string started_at = 6;
  string finished_at = 7;
}

// CI metrics messages

message GetJobAttemptMetricsRequest {
  // attempt_id identifies the concrete job attempt whose metric samples to fetch.
  string attempt_id = 1;
}

message GetJobMetricsRequest {
  // job_id identifies the job whose attempts should be summarized.
  string job_id = 1;
}

message GetRunMetricsRequest {
  // run_id identifies the run whose workflow/job/attempt metrics should be summarized.
  string run_id = 1;
}

message GetJobAttemptMetricsResponse {
  CIMetricsRunContext run = 1;
  CIMetricsWorkflowContext workflow = 2;
  CIMetricsJobContext job = 3;
  CIMetricsAttemptMetrics attempt = 4;
  // snapshot_at is the request timestamp used as the upper bound for running attempts.
  string snapshot_at = 5;
}

message GetJobMetricsResponse {
  CIMetricsRunContext run = 1;
  CIMetricsWorkflowContext workflow = 2;
  CIMetricsJobContext job = 3;
  repeated CIMetricsAttemptSummary attempts = 4;
  // snapshot_at is the request timestamp used as the upper bound for running attempts.
  string snapshot_at = 5;
}

message GetRunMetricsResponse {
  CIMetricsRunContext run = 1;
  repeated CIMetricsWorkflowMetrics workflows = 2;
  // snapshot_at is the request timestamp used as the upper bound for running attempts.
  string snapshot_at = 3;
}

message CIMetricsWorkflowMetrics {
  CIMetricsWorkflowContext workflow = 1;
  repeated CIMetricsJobMetrics jobs = 2;
}

message CIMetricsJobMetrics {
  CIMetricsJobContext job = 1;
  repeated CIMetricsAttemptSummary attempts = 2;
}

message CIMetricsAttemptMetrics {
  CIMetricsAttemptContext attempt = 1;
  CIMetricsAvailability availability = 2;
  CIMetricsStats stats = 3;
  CIMetricsCapMetadata cap = 4;
  repeated CIMetricSample samples = 5;
}

message CIMetricsAttemptSummary {
  CIMetricsAttemptContext attempt = 1;
  CIMetricsAvailability availability = 2;
  CIMetricsStats stats = 3;
  CIMetricsCapMetadata cap = 4;
}

message CIMetricsRunContext {
  string run_id = 1;
  string repo = 2;
  string ref = 3;
  string sha = 4;
  string head_sha = 5;
  string trigger = 6;
  string status = 7;
  string created_at = 8;
  string started_at = 9;
  string finished_at = 10;
}

message CIMetricsWorkflowContext {
  string workflow_id = 1;
  string workflow_path = 2;
  string name = 3;
  string status = 4;
  string created_at = 5;
  string started_at = 6;
  string finished_at = 7;
}

message CIMetricsJobContext {
  string job_id = 1;
  string job_key = 2;
  string status = 3;
  string conclusion = 4;
  int32 current_attempt = 5;
  string created_at = 6;
  string started_at = 7;
  string finished_at = 8;
}

message CIMetricsAttemptContext {
  string attempt_id = 1;
  int32 attempt = 2;
  string status = 3;
  string conclusion = 4;
  string sandbox_id = 5;
  string session_id = 6;
  string created_at = 7;
  string started_at = 8;
  string finished_at = 9;
}

message CIMetricSample {
  string timestamp = 1;
  optional double cpu_utilization = 2;
  optional double memory_utilization = 3;
  optional uint64 memory_usage_bytes = 4;
}

message CIMetricsStats {
  uint32 sample_count = 1;
  uint32 cpu_sample_count = 2;
  uint32 memory_sample_count = 3;
  optional double peak_cpu_utilization = 4;
  optional double average_cpu_utilization = 5;
  optional double peak_memory_utilization = 6;
  optional double average_memory_utilization = 7;
  string observed_started_at = 8;
  string observed_finished_at = 9;
  optional uint64 peak_memory_usage_bytes = 10;
  optional double average_memory_usage_bytes = 11;
}

enum CIMetricsAvailabilityCode {
  CI_METRICS_AVAILABILITY_CODE_UNSPECIFIED = 0;
  CI_METRICS_AVAILABILITY_CODE_AVAILABLE = 1;
  CI_METRICS_AVAILABILITY_CODE_NO_SANDBOX = 2;
  CI_METRICS_AVAILABILITY_CODE_NO_TIME_RANGE = 3;
  CI_METRICS_AVAILABILITY_CODE_NO_SAMPLES = 4;
}

message CIMetricsAvailability {
  CIMetricsAvailabilityCode code = 1;
  string reason = 2;
}

message CIMetricsCapMetadata {
  uint32 raw_sample_count = 1;
  uint32 returned_sample_count = 2;
  uint32 max_returned_sample_count = 3;
  bool downsampled = 4;
  string downsample_strategy = 5;
}

// GetJobSummary messages

message GetJobAttemptSummaryRequest {
  // attempt_id identifies the job attempt whose authored summary markdown to fetch
  string attempt_id = 1;
}

message GetJobSummaryRequest {
  // job_id identifies the job whose current/latest attempt summary markdown to fetch
  string job_id = 1;
}

message GetJobSummaryResponse {
  string org_id = 1;
  string run_id = 2;
  string workflow_id = 3;
  string job_id = 4;
  string attempt_id = 5;
  int32 attempt = 6;
  string job_status = 7;
  string attempt_status = 8;
  bool has_summary = 9;
  // empty_reason is set when has_summary is false, e.g. "no_summary" or "no_attempt".
  string empty_reason = 10;
  // step_count counts non-empty step summaries included in markdown.
  uint32 step_count = 11;
  // markdown contains the authored step summary markdown joined in step order.
  string markdown = 12;
}

// GetJobAttemptLogs messages

message GetJobAttemptLogsRequest {
  // attempt_id identifies the job attempt whose logs to fetch
  string attempt_id = 1;
  // The page token indicating which page of results to return.
  string page_token = 2;
}

message GetJobAttemptLogsResponse {
  repeated LogLine lines = 1;
  // Token to retrieve the next page of results; empty if no more pages.
  string next_page_token = 2;
}

message StreamJobAttemptLogsRequest {
  // attempt_id identifies the concrete job attempt whose logs to stream. Set
  // exactly one of attempt_id or job_id.
  string attempt_id = 1;
  // Opaque cursor returned by a previous stream response for the same target.
  // Omit it to stream from the first persisted line.
  string cursor = 2;
  // job_id identifies a CI job. The stream resolves it to that job's latest
  // attempt. Set exactly one of attempt_id or job_id.
  string job_id = 3;
}

message StreamJobAttemptLogsResponse {
  // line is set when this response carries a persisted log line.
  // Status-only responses can omit it while the stream is waiting for rows.
  LogLine line = 1;
  // Opaque cursor to resume after the emitted line.
  string next_cursor = 2;
  // attempt_status is the current lowercase attempt state, e.g. "queued",
  // "running", "finished", "failed", or "cancelled".
  string attempt_status = 3;
}

enum JobAttemptLogExportFormat {
  // Defaults to JOB_ATTEMPT_LOG_EXPORT_FORMAT_TEXT.
  JOB_ATTEMPT_LOG_EXPORT_FORMAT_UNSPECIFIED = 0;
  // Timestamped UTF-8 text. Each exported row is `RFC3339Nano timestamp`, a
  // space, the log body, and a trailing newline.
  JOB_ATTEMPT_LOG_EXPORT_FORMAT_TEXT = 1;
  // UTF-8 newline-delimited JSON. Each exported row is one JSON object with
  // type, timestamp, timestamp_ms, stream, step_key, line_number, and body.
  JOB_ATTEMPT_LOG_EXPORT_FORMAT_JSONL = 2;
}

message ExportJobAttemptLogsRequest {
  // attempt_id identifies the concrete job attempt whose logs to export. Set
  // exactly one of attempt_id or job_id.
  string attempt_id = 1;
  // job_id identifies a CI job. Export resolves it to that job's latest attempt
  // at stream start. Set exactly one of attempt_id or job_id.
  string job_id = 2;
  // format selects the export byte format. Unspecified defaults to text.
  JobAttemptLogExportFormat format = 3;
}

message JobAttemptLogExportMetadata {
  // filename is an advisory, non-stable basename hint for generated clients.
  // It is not a destination path and clients must not depend on the stem staying
  // stable across calls. It is basename-only ASCII and ends in .txt for text or
  // .jsonl for JSONL.
  string filename = 1;
  // content_type is the exact media type for chunk bytes:
  // `text/plain; charset=utf-8` for text or
  // `application/x-ndjson; charset=utf-8` for JSONL.
  string content_type = 2;
  // format is the selected byte format for following chunk responses.
  JobAttemptLogExportFormat format = 3;
}

message ExportJobAttemptLogsResponse {
  oneof event {
    // metadata is the first response in every successful export stream. It
    // describes the byte format and advisory filename for following chunks.
    JobAttemptLogExportMetadata metadata = 1;
    // chunk contains export file bytes. Append chunks in stream order to
    // reconstruct the text or JSONL export. In JSON-encoded Connect/grpc-web
    // protocols, bytes are represented using the protocol's base64 encoding.
    bytes chunk = 2;
  }
}

message LogLine {
  // step_key identifies the stable Depot log/step correlation key.
  string step_key = 1;
  // timestamp_ms is the log timestamp as Unix epoch milliseconds.
  int64 timestamp_ms = 2;
  // line_number is the persisted line number within the emitting stream.
  uint32 line_number = 3;
  // stream is 0 for stdout and 1 for stderr.
  uint32 stream = 4;
  // body is the log line content without transport framing.
  string body = 5;
  // step_id identifies the optional user-authored workflow step ID when available.
  string step_id = 6;
  // step_name identifies the optional user-authored workflow step name when available.
  string step_name = 7;
}

// ListRuns messages

message ListRunsRequest {
  // status filters recent runs by lowercase status values (queued, running, finished, failed, cancelled);
  // defaults to [running, queued] when empty
  repeated string status = 1;
  // page_size is the maximum number of recent runs to return. Defaults to 50 and is capped at 100.
  int32 page_size = 2;
  // page_token resumes cursor pagination from a previous response.
  string page_token = 3;
  // repo filters recent runs by exact repository slug, such as "owner/repo"
  string repo = 4;
  // sha filters recent runs by commit SHA prefix, matching either sha or head_sha
  string sha = 5;
  // trigger filters recent runs by exact parent run trigger, e.g. "push" or "workflow_dispatch".
  string trigger = 6;
  // pr filters recent runs by pull request number. repo is required when pr is set.
  string pr = 7;
}

message ListRunsResponse {
  repeated ListRunsResponseRun runs = 1;
  string next_page_token = 2;
}

message ListRunsResponseRun {
  string run_id = 1;
  string repo = 2;
  string trigger = 3;
  string sha = 4;
  // status is the lowercase run state, e.g. "queued", "running", or "finished".
  string status = 5;
  string created_at = 6;
  string ref = 7;
  string head_sha = 8;
}

// ListWorkflows messages

message ListWorkflowsRequest {
  reserved 2;
  reserved "page_token";

  // page_size is the maximum number of recent workflows to return. Defaults to 50 and is capped at 200.
  int32 page_size = 1;
  // name filters recent workflows by substring match on the workflow name or path fallback.
  string name = 3;
  // repo filters recent workflows by repo in {owner}/{repo} format.
  string repo = 4;
  // status filters recent workflows by lowercase workflow status. Multiple values are ORed.
  repeated string status = 5;
  // trigger filters recent workflows by the parent run trigger, e.g. "push" or "workflow_dispatch".
  string trigger = 6;
  // sha filters recent workflows by parent run head SHA prefix.
  string sha = 7;
  // pr filters recent workflows by pull request number.
  string pr = 8;
}

message ListWorkflowsResponse {
  reserved 2;
  reserved "next_page_token";

  repeated ListWorkflowsResponseWorkflow workflows = 1;
}

message ListWorkflowsResponseWorkflow {
  string workflow_id = 1;
  string name = 2;
  string workflow_path = 3;
  string repo = 4;
  // status is the lowercase workflow state, e.g. "queued", "running", or "finished".
  string status = 5;
  string trigger = 6;
  string run_id = 7;
  string sha = 8;
  string head_sha = 9;
  string created_at = 10;
  ListWorkflowsResponseJobCounts job_counts = 11;
}

message ListWorkflowsResponseJobCounts {
  int32 total = 1;
  int32 queued = 2;
  int32 waiting = 3;
  int32 running = 4;
  int32 finished = 5;
  int32 failed = 6;
  int32 cancelled = 7;
  int32 skipped = 8;
}
