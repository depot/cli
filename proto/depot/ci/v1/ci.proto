syntax = "proto3";

package depot.ci.v1;

// CIService is the customer-facing API for managing CI runs, workflows, and jobs.
// Authenticated with organization or app tokens.
service CIService {
  // Run triggers a CI run that can contain one or more workflows
  rpc Run(RunRequest) returns (RunResponse) {}

  // DispatchWorkflow triggers a single workflow via workflow_dispatch, validating inputs against the workflow's schema
  rpc DispatchWorkflow(DispatchWorkflowRequest) returns (DispatchWorkflowResponse) {}

  // RetryJob retries a failed job within a running workflow
  rpc RetryJob(RetryJobRequest) returns (RetryJobResponse) {}

  // RerunWorkflow resets all jobs in a finished workflow and re-runs them
  rpc RerunWorkflow(RerunWorkflowRequest) returns (RerunWorkflowResponse) {}

  // RetryFailedJobs retries only failed/cancelled jobs (and their skipped dependents) in a finished workflow
  rpc RetryFailedJobs(RetryFailedJobsRequest) returns (RetryFailedJobsResponse) {}

  // CancelJob cancels a queued or running job
  rpc CancelJob(CancelJobRequest) returns (CancelJobResponse) {}

  // CancelWorkflow cancels a queued or running workflow and all its child jobs
  rpc CancelWorkflow(CancelWorkflowRequest) returns (CancelWorkflowResponse) {}

  // GetRun returns a flat CI run record
  rpc GetRun(GetRunRequest) returns (GetRunResponse) {}

  // CancelRun cancels a queued or running CI run and all active child work
  rpc CancelRun(CancelRunRequest) returns (CancelRunResponse) {}

  // GetRunStatus returns the current status of a run including its workflows, jobs, and attempts
  rpc GetRunStatus(GetRunStatusRequest) returns (GetRunStatusResponse) {}

  // GetJobAttemptLogs returns log lines for a job attempt
  rpc GetJobAttemptLogs(GetJobAttemptLogsRequest) returns (GetJobAttemptLogsResponse) {}

  // ListRuns returns a paginated list of CI runs for the authenticated organization
  rpc ListRuns(ListRunsRequest) returns (ListRunsResponse) {}
}

// MigrationService is the API used by `depot ci migrate` to handhold customers during the
// process of migrating GitHub workflow files to Depot CI
service MigrationService {
  rpc GetInstallation(GetInstallationRequest) returns (GetInstallationResponse) {}
  rpc ImportSecretsAndVars(ImportSecretsAndVarsRequest) returns (ImportSecretsAndVarsResponse) {}
}

message GetInstallationRequest {
  // repo is the name of the target GitHub repo in {org}/{repo} format
  string repo = 1;
}

message GetInstallationResponse {
  repeated Installation installations = 1;
}

message ImportSecretsAndVarsRequest {
  // repo is the name of the target GitHub repo in {org}/{repo} format
  string repo = 1;
  // dry_run returns the planned branch, workflow name, and content without committing
  bool dry_run = 2;
  // branch_name overrides the default branch name used to create the migration workflow
  string branch_name = 3;

  // include_secrets is a list of secret names to include in the workflow
  repeated string include_secrets = 4;
  // include_vars is a list of variable names to include in the workflow
  repeated string include_vars = 5;
}
message ImportSecretsAndVarsResponse {
  oneof result {
    DryRunResult dry_run_result = 1;
    RunResult run_result = 2;
  }
}

message DryRunResult {
  string branch_name = 1;
  string workflow_name = 2;
  string workflow_content = 3;
}

message RunResult {
  string workflow_url = 1;
}

message Installation {
  string installation_id = 1;
  string settings_url = 2;
  string owner = 3;
  bool requires_new_perms = 4;
  bool repo_accessible = 5;
}

message RunRequest {
  // repo is the name of the target GitHub repo in {org}/{repo} format
  string repo = 1;
  // sha points to a snapshot of code, used as context for the run
  // defaults to HEAD of default branch
  optional string sha = 2;
  // workflow specifies which workflow file to run (e.g., ".depot/workflows/ci.yml")
  // mutually exclusive with workflow_content; if neither provided, runs all workflows in repo
  optional string workflow = 3;
  // workflow_content is a list of inline workflow YAML strings
  // mutually exclusive with workflow; if neither provided, runs all workflows in repo
  repeated string workflow_content = 4;
  // job filters to a specific job within the workflow
  // only valid when a single workflow is specified (workflow or single workflow_content)
  optional string job = 5;
  // When set, orchestrator compile fetches this generic cache key (same bytes the worker applies)
  // and runs git apply in the compile temp repo before resolving .depot/actions and .depot/workflows.
  optional string workspace_patch_cache_key = 6;
}

message RunResponse {
  // org_id is the organization that owns this run
  string org_id = 2;
  // run_id is the unique identifier for the created CI run
  string run_id = 1;
}

// DispatchWorkflow messages

message DispatchWorkflowRequest {
  // org_id is the organization that owns the workflow
  string org_id = 1;
  // repo is the name of the target GitHub repo in {org}/{repo} format
  string repo = 2;
  // workflow is the workflow file basename (e.g., "deploy.yml"), not the
  // full repo path. Matches GitHub's workflow_dispatch convention.
  string workflow = 3;
  // ref is the branch or tag name to run the workflow on (e.g., "main")
  string ref = 4;
  // inputs are key-value pairs matching the workflow's input definitions
  // all values are strings; the server coerces to the correct type
  map<string, string> inputs = 5;
}

message DispatchWorkflowResponse {
  // org_id is the organization that owns this run
  string org_id = 1;
  // run_id is the unique identifier for the created CI run
  string run_id = 2;
}

// RetryJob messages

message RetryJobRequest {
  // workflow_id identifies the workflow containing the job
  string workflow_id = 1;
  // job_id identifies the job to retry
  string job_id = 2;
}

message RetryJobResponse {
  // job_id is the ID of the retried job
  string job_id = 1;
  // attempt_id is the new attempt's unique identifier
  string attempt_id = 2;
  // attempt is the new attempt number
  int32 attempt = 3;
  // status is the new job status (should be "queued")
  string status = 4;
}

// RerunWorkflow messages

message RerunWorkflowRequest {
  // workflow_id identifies the workflow to re-run
  string workflow_id = 1;
}

message RerunWorkflowResponse {
  // workflow_id is the ID of the re-run workflow
  string workflow_id = 1;
  // job_count is the number of jobs reset to queued
  int32 job_count = 2;
}

// RetryFailedJobs messages

message RetryFailedJobsRequest {
  // workflow_id identifies the workflow containing failed jobs
  string workflow_id = 1;
}

message RetryFailedJobsResponse {
  // workflow_id is the ID of the workflow
  string workflow_id = 1;
  // job_ids are the IDs of jobs that were reset to queued
  repeated string job_ids = 2;
  // job_count is the number of jobs reset to queued
  int32 job_count = 3;
}

// CancelJob messages

message CancelJobRequest {
  // workflow_id identifies the workflow containing the job
  string workflow_id = 1;
  // job_id identifies the job to cancel
  string job_id = 2;
}

message CancelJobResponse {
  // job_id is the ID of the cancelled job
  string job_id = 1;
  // status is the new job status (should be "cancelled")
  string status = 2;
}

// CancelWorkflow messages

message CancelWorkflowRequest {
  // workflow_id identifies the workflow to cancel
  string workflow_id = 1;
}

message CancelWorkflowResponse {
  // workflow_id is the ID of the cancelled workflow
  string workflow_id = 1;
  // status is the new workflow status (should be "cancelled")
  string status = 2;
}

// GetRun messages

message GetRunRequest {
  string run_id = 1;
}

message GetRunResponse {
  string org_id = 1;
  string run_id = 2;
  string repo = 3;
  string ref = 4;
  string sha = 5;
  string head_sha = 6;
  string trigger = 7;
  // status is the lowercase run state, e.g. "queued", "running", or "finished".
  string status = 8;
  string created_at = 9;
  string started_at = 10;
  string finished_at = 11;
}

// CancelRun messages

message CancelRunRequest {
  string run_id = 1;
}

message CancelRunResponse {
  string run_id = 1;
  string status = 2;
}

// GetRunStatus messages

message GetRunStatusRequest {
  string run_id = 1;
}

message GetRunStatusResponse {
  string org_id = 1;
  string run_id = 2;
  string status = 3;
  repeated WorkflowStatus workflows = 4;
}

message WorkflowStatus {
  string workflow_id = 1;
  string status = 2;
  // workflow_path is the workflow file path (e.g. ".depot/workflows/ci.yml")
  // empty for inline workflows
  string workflow_path = 3;
  repeated JobStatus jobs = 4;
  // workflow name from YAML `name:` key, empty if not set
  string name = 5;
  // error_message is populated when the workflow has failed (e.g. compilation or validation errors)
  string error_message = 6;
}

message JobStatus {
  string job_id = 1;
  // job_key is the job identifier from the workflow (e.g. "build", "test")
  string job_key = 2;
  string status = 3;
  repeated AttemptStatus attempts = 4;
}

message AttemptStatus {
  string attempt_id = 1;
  int32 attempt = 2;
  string status = 3;
  // sandbox_id is populated when the attempt is running on a sandbox.
  string sandbox_id = 4;
  // session_id is populated alongside sandbox_id.
  string session_id = 5;
}

// GetJobAttemptLogs messages

message GetJobAttemptLogsRequest {
  // attempt_id identifies the job attempt whose logs to fetch
  string attempt_id = 1;
  // The page token indicating which page of results to return.
  string page_token = 2;
}

message GetJobAttemptLogsResponse {
  repeated LogLine lines = 1;
  // Token to retrieve the next page of results; empty if no more pages.
  string next_page_token = 2;
}

message LogLine {
  string step_id = 1;
  int64 timestamp_ms = 2;
  uint32 line_number = 3;
  uint32 stream = 4; // 0 = stdout, 1 = stderr
  string body = 5;
}

// ListRuns messages

enum CIRunStatus {
  CI_RUN_STATUS_UNSPECIFIED = 0;
  CI_RUN_STATUS_QUEUED = 1;
  CI_RUN_STATUS_RUNNING = 2;
  CI_RUN_STATUS_FINISHED = 3;
  CI_RUN_STATUS_FAILED = 4;
  CI_RUN_STATUS_CANCELLED = 5;
}

message ListRunsRequest {
  // status filters runs by status; defaults to [RUNNING, QUEUED] when empty
  repeated CIRunStatus status = 1;
  int32 page_size = 2;
  string page_token = 3;
  // repo filters runs by exact repository slug, such as "owner/repo"
  string repo = 4;
  // sha filters runs by commit SHA prefix, matching either sha or head_sha
  string sha = 5;
  // ref filters runs by exact fully qualified Git ref, such as refs/heads/main
  string ref = 6;
  // branch filters runs by branch name and normalizes to refs/heads/<branch>
  string branch = 7;
  // pull_request_number filters runs by GitHub pull request number.
  optional int32 pull_request_number = 8;
}

message ListRunsResponse {
  repeated ListRunsResponseRun runs = 1;
  string next_page_token = 2;
}

message ListRunsResponseRun {
  string run_id = 1;
  string repo = 2;
  string trigger = 3;
  string sha = 4;
  // status is the lowercase run state, e.g. "queued", "running", or "finished".
  string status = 5;
  string created_at = 6;
  string ref = 7;
  string head_sha = 8;
}
