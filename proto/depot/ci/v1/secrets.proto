syntax = "proto3";

package depot.ci.v1;

import "google/protobuf/timestamp.proto";

service SecretService {
  rpc AddSecret(AddSecretRequest) returns (AddSecretResponse);
  rpc RemoveSecret(RemoveSecretRequest) returns (RemoveSecretResponse);
  rpc ListSecrets(ListSecretsRequest) returns (ListSecretsResponse);
  rpc UpdateSecretDescription(UpdateSecretDescriptionRequest) returns (UpdateSecretDescriptionResponse);
  rpc BatchAddSecrets(BatchAddSecretsRequest) returns (BatchAddSecretsResponse);
}

message AddSecretRequest {
  string name = 1;
  string value = 2;
  optional string description = 3;
  // Optional. If set, scope to exactly one repo (owner/repo). Empty = all repos.
  optional string repo = 4;
}

message AddSecretResponse {}

message RemoveSecretRequest {
  string name = 1;
  // Optional. If set, removes the repo-scoped entry. Empty = all-repos entry.
  optional string repo = 2;
}

message RemoveSecretResponse {}

message ListSecretsRequest {
  // Optional. If empty: return all secrets across all scopes for the org.
  // If set to owner/repo: return entries that apply to that repo (all-repos + repo-specific).
  optional string repo_filter = 1;
}

message ListSecretsResponse {
  repeated Secret secrets = 1;
}

message Secret {
  string name = 1;
  optional string description = 2;
  optional google.protobuf.Timestamp last_modified = 3;
  // Scope: empty = all repos, non-empty = exactly this owner/repo.
  optional string repo = 4;
}

message UpdateSecretDescriptionRequest {
  string name = 1;
  string description = 2;
  // Optional. If set, update the repo-scoped entry. Empty = all-repos entry.
  optional string repo = 3;
}

message UpdateSecretDescriptionResponse {}

message BatchAddSecretsRequest {
  repeated AddSecretRequest secrets = 1;
  // Optional. If set, scope all secrets in this batch to this repo.
  optional string repo = 2;
}

message BatchAddSecretsResponse {}
